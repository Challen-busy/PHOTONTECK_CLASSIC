<div style="font-family:-apple-system,'PingFang SC',sans-serif;max-width:800px">
  <h3 style="margin:0 0 16px;color:#1a1a2e">创建销售订单</h3>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;padding:16px;background:#fafafa;border-radius:8px">
    <div>
      <label style="font-size:12px;color:#888">客户</label>
      <select name="customer_id" style="width:100%;padding:8px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px">
        <option value="">选择客户...</option>
      </select>
    </div>
    <div>
      <label style="font-size:12px;color:#888">币种</label>
      <select name="currency" style="width:100%;padding:8px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px">
        <option value="USD">USD 美元</option>
        <option value="CNY">CNY 人民币</option>
        <option value="HKD">HKD 港币</option>
      </select>
    </div>
    <div>
      <label style="font-size:12px;color:#888">账期(天)</label>
      <input name="payment_terms_days" type="number" value="30" style="width:100%;padding:8px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px"/>
    </div>
    <div>
      <label style="font-size:12px;color:#888">发货方式</label>
      <select name="shipping_method" style="width:100%;padding:8px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px">
        <option value="FOB">FOB 离岸</option>
        <option value="CIF">CIF 到岸</option>
        <option value="DAP">DAP 送货到厂</option>
      </select>
    </div>
  </div>

  <h4 style="margin:0 0 8px;color:#333">订单明细</h4>
  <table style="width:100%;border-collapse:collapse;margin-bottom:12px" id="lines-table">
    <thead>
      <tr style="background:#f0f0f0">
        <th style="padding:8px;text-align:left;font-size:12px;color:#888">料号</th>
        <th style="padding:8px;text-align:left;font-size:12px;color:#888">物料名称</th>
        <th style="padding:8px;text-align:right;font-size:12px;color:#888;width:100px">数量</th>
        <th style="padding:8px;text-align:right;font-size:12px;color:#888;width:120px">单价</th>
        <th style="padding:8px;text-align:right;font-size:12px;color:#888;width:120px">金额</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td style="padding:4px"><input name="line_1_sku" placeholder="输入料号" style="width:100%;padding:6px;border:1px solid #d9d9d9;border-radius:4px"/></td>
        <td style="padding:4px"><input name="line_1_name" placeholder="自动带出" readonly style="width:100%;padding:6px;border:1px solid #eee;border-radius:4px;background:#fafafa"/></td>
        <td style="padding:4px"><input name="line_1_qty" type="number" value="1" style="width:100%;padding:6px;border:1px solid #d9d9d9;border-radius:4px;text-align:right"/></td>
        <td style="padding:4px"><input name="line_1_price" type="number" step="0.01" style="width:100%;padding:6px;border:1px solid #d9d9d9;border-radius:4px;text-align:right"/></td>
        <td style="padding:4px;text-align:right;font-weight:600" id="line_1_total">0</td>
      </tr>
      <tr>
        <td style="padding:4px"><input name="line_2_sku" placeholder="输入料号" style="width:100%;padding:6px;border:1px solid #d9d9d9;border-radius:4px"/></td>
        <td style="padding:4px"><input name="line_2_name" placeholder="自动带出" readonly style="width:100%;padding:6px;border:1px solid #eee;border-radius:4px;background:#fafafa"/></td>
        <td style="padding:4px"><input name="line_2_qty" type="number" value="0" style="width:100%;padding:6px;border:1px solid #d9d9d9;border-radius:4px;text-align:right"/></td>
        <td style="padding:4px"><input name="line_2_price" type="number" step="0.01" style="width:100%;padding:6px;border:1px solid #d9d9d9;border-radius:4px;text-align:right"/></td>
        <td style="padding:4px;text-align:right;font-weight:600" id="line_2_total">0</td>
      </tr>
    </tbody>
  </table>

  <div style="text-align:right;margin-bottom:16px;font-size:18px">
    合计: <strong id="grand_total">0</strong>
  </div>

  <div style="margin-bottom:16px">
    <label style="font-size:12px;color:#888">备注</label>
    <textarea name="notes" rows="2" style="width:100%;padding:8px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px" placeholder="选填"></textarea>
  </div>

  <button data-action="submit" style="width:100%;padding:10px;background:#1a1a2e;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer">
    创建订单
  </button>
</div>
